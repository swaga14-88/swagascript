<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWAGA SCRIPT — читы для Roblox</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        :root {
            --primary: #4361ee;
            --primary-dark: #3a56d4;
            --secondary: #7209b7;
            --accent: #f72585;
            --dark: #1a1a2e;
            --darker: #0f0f1a;
            --light: #f8f9fa;
            --gray: #6c757d;
            --success: #4cc9f0;
            --warning: #f8961e;
            --danger: #e63946;
            --card-bg: #16213e;
            --border-radius: 12px;
            --shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            --transition: all 0.3s ease;
        }

        body {
            background: linear-gradient(135deg, var(--darker) 0%, var(--dark) 100%);
            color: var(--light);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
            text-decoration: none;
            cursor: pointer;
        }

        .logo i {
            color: var(--accent);
        }

        .logo span {
            background: linear-gradient(90deg, var(--accent), var(--success));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .tg-link {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #0088cc;
            padding: 10px 20px;
            border-radius: var(--border-radius);
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }

        .tg-link:hover {
            background: #0077b5;
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .user-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn {
            padding: 12px 28px;
            border-radius: var(--border-radius);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow);
        }

        .btn-outline {
            background: transparent;
            color: var(--light);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .btn-outline:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-success {
            background: var(--success);
            color: var(--dark);
        }

        .btn-success:hover {
            background: #3ab8d9;
            transform: translateY(-3px);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
            transform: translateY(-3px);
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 0.9rem;
        }

        .section {
            padding: 120px 0 60px;
            min-height: 100vh;
            display: none;
        }

        .section.active {
            display: block;
        }

        .section-title {
            text-align: center;
            margin-bottom: 40px;
            font-size: 2.5rem;
        }

        .section-title span {
            color: var(--accent);
            position: relative;
        }

        .search-box {
            max-width: 600px;
            margin: 0 auto 40px;
            display: flex;
            gap: 10px;
        }

        .search-box input {
            flex: 1;
            padding: 18px 25px;
            border-radius: 50px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 1.1rem;
            transition: var(--transition);
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.2);
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: var(--transition);
            cursor: pointer;
            text-align: center;
        }

        .game-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: var(--shadow);
        }

        .game-card i {
            font-size: 3rem;
            color: var(--success);
            margin-bottom: 15px;
        }

        .game-card h3 {
            font-size: 1.4rem;
            margin-bottom: 10px;
        }

        .game-card p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
        }

        .back-btn {
            margin-bottom: 30px;
        }

        .scripts-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin: 30px 0;
        }

        .script-item {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .script-meta {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: var(--gray);
            font-size: 0.9rem;
            flex-wrap: wrap;
        }

        .script-author {
            color: var(--success);
            font-weight: 600;
        }

        .script-date {
            color: var(--gray);
        }

        .script-code {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            color: #0f0;
            font-family: 'Courier New', monospace;
            margin-bottom: 15px;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 300px;
            overflow-y: auto;
        }

        .script-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .copy-script-btn {
            flex: 2;
        }

        .report-btn {
            flex: 1;
        }

        .comments {
            margin: 30px 0;
        }

        .comment {
            background: rgba(255, 255, 255, 0.05);
            border-radius: var(--border-radius);
            padding: 20px;
            margin-bottom: 15px;
            border-left: 3px solid var(--accent);
            position: relative;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: var(--gray);
            font-size: 0.9rem;
            flex-wrap: wrap;
        }

        .comment-name {
            font-weight: 600;
            color: var(--success);
        }

        .comment-actions {
            margin-top: 10px;
            display: flex;
            justify-content: flex-end;
        }

        .add-comment {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .add-comment input,
        .add-comment textarea {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: var(--border-radius);
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            font-size: 1rem;
            transition: var(--transition);
        }

        .add-comment input:focus,
        .add-comment textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.2);
        }

        .add-comment textarea {
            min-height: 100px;
            resize: vertical;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--dark);
            width: 90%;
            max-width: 500px;
            border-radius: var(--border-radius);
            padding: 40px;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--light);
            font-size: 1.5rem;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .close-modal:hover {
            transform: rotate(90deg);
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: var(--light);
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 15px;
            border-radius: var(--border-radius);
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.2);
        }

        footer {
            background: rgba(0, 0, 0, 0.3);
            padding: 30px 0;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.5);
        }

        @media (max-width: 768px) {
            .header-container {
                flex-direction: column;
                align-items: stretch;
            }

            .user-area {
                justify-content: center;
            }

            .section-title {
                font-size: 2rem;
            }

            .search-box {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="container header-container">
            <div class="logo" onclick="showHome()">
                <i class="fas fa-robot"></i>
                <span>SWAGA SCRIPT</span>
            </div>
            <div class="user-area">
                <a href="https://t.me/swagascript" target="_blank" class="tg-link">
                    <i class="fab fa-telegram"></i> @swagascript
                </a>
                <div id="authSection">
                    <button class="btn btn-primary" onclick="loginWithGitHub()" id="loginBtn">
                        <i class="fab fa-github"></i> Войти
                    </button>
                    <div id="userInfo" style="display: none; align-items: center; gap: 10px;">
                        <span><i class="fab fa-github"></i> <span id="githubUsername"></span></span>
                        <button class="btn btn-outline btn-sm" onclick="logout()">Выйти</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Главная -->
    <section id="home-section" class="section active">
        <div class="container">
            <h1 class="section-title">Выбери <span>игру</span></h1>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Поиск игры..." onkeyup="searchGames()">
                <button class="btn btn-success" onclick="showAddScriptModal()">
                    <i class="fas fa-plus"></i> Добавить скрипт
                </button>
            </div>
            <div id="games-list" class="games-grid">
                <!-- Игры загружаются сюда -->
            </div>
        </div>
    </section>

    <!-- Страница игры -->
    <section id="game-section" class="section">
        <div class="container">
            <button class="btn btn-outline back-btn" onclick="showHome()">
                <i class="fas fa-arrow-left"></i> Назад
            </button>
            <h2 id="gameTitle" class="section-title"></h2>

            <div id="scriptsList" class="scripts-container">
                <!-- Скрипты загружаются сюда -->
            </div>

            <h3>Комментарии</h3>
            <div id="commentsList" class="comments"></div>

            <div class="add-comment">
                <input type="text" id="commentName" placeholder="Ваше имя (или Аноним)">
                <textarea id="commentText" placeholder="Напишите комментарий..."></textarea>
                <button class="btn btn-success" onclick="addComment()">
                    <i class="fas fa-paper-plane"></i> Отправить
                </button>
            </div>
        </div>
    </section>

    <!-- Модалка добавления скрипта -->
    <div class="modal" id="addScriptModal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal('addScriptModal')">&times;</button>
            <h2>Добавить скрипт</h2>
            <div class="form-group">
                <label>Название игры</label>
                <input type="text" id="newGameName" placeholder="Введите название игры">
            </div>
            <div class="form-group">
                <label>Описание игры (если новая)</label>
                <textarea id="newGameDesc" placeholder="Описание..."></textarea>
            </div>
            <div class="form-group">
                <label>Скрипт (Lua)</label>
                <textarea id="newScriptContent" placeholder="loadstring(...)"></textarea>
            </div>
            <button class="btn btn-success" onclick="addScript()" style="width: 100%;">
                <i class="fas fa-upload"></i> Опубликовать
            </button>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>© 2025 SWAGA SCRIPT — читы для Roblox</p>
        </div>
    </footer>

    <script>
        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyBJn3GAs1mikK9eO87BevUEvZ7rqXG_uZ4",
            authDomain: "swaga-script.firebaseapp.com",
            projectId: "swaga-script",
            storageBucket: "swaga-script.firebasestorage.app",
            messagingSenderId: "368222431535",
            appId: "1:368222431535:web:759fb5182eb07fe25c19da"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const provider = new firebase.auth.GithubAuthProvider();

        // Global variables
        let currentUser = null;
        let currentGameId = null;
        let allGames = [];

        // Запрещённые слова
        const forbiddenWords = ['реклама', 'пиар', 'промо', 'сука', 'бля', 'хуй', 'пизда', 'fuck', 'shit', 'spam'];

        function containsForbidden(text) {
            return forbiddenWords.some(word => text.toLowerCase().includes(word));
        }

        function escapeHtml(text) {
            let div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Auth
        window.loginWithGitHub = () => {
            auth.signInWithPopup(provider)
                .then(result => {
                    currentUser = result.user;
                    updateAuthUI();
                })
                .catch(error => alert('Ошибка: ' + error.message));
        };

        window.logout = () => {
            auth.signOut().then(() => {
                currentUser = null;
                updateAuthUI();
            });
        };

        function updateAuthUI() {
            if (currentUser) {
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('userInfo').style.display = 'flex';
                document.getElementById('githubUsername').textContent = currentUser.displayName || currentUser.email;
            } else {
                document.getElementById('loginBtn').style.display = 'inline-flex';
                document.getElementById('userInfo').style.display = 'none';
            }
        }

        auth.onAuthStateChanged(user => {
            currentUser = user;
            updateAuthUI();
        });

        // Load games
        async function loadGames() {
            try {
                const snapshot = await db.collection('games').get();
                allGames = snapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                }));
                displayGames(allGames);
            } catch (error) {
                console.error('Error loading games:', error);
            }
        }

        function displayGames(games) {
            const container = document.getElementById('games-list');
            container.innerHTML = '';
            
            if (games.length === 0) {
                container.innerHTML = '<p style="text-align: center;">Пока нет игр. Добавьте первую!</p>';
                return;
            }

            games.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.onclick = () => showGame(game.id);
                card.innerHTML = `
                    <i class="fas fa-gamepad"></i>
                    <h3>${escapeHtml(game.name)}</h3>
                    <p>${escapeHtml(game.desc || '')}</p>
                `;
                container.appendChild(card);
            });
        }

        window.searchGames = () => {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allGames.filter(g => g.name.toLowerCase().includes(query));
            displayGames(filtered);
        };

        // Show game
        window.showGame = async (gameId) => {
            console.log('Opening game:', gameId);
            currentGameId = gameId;

            try {
                const gameDoc = await db.collection('games').doc(gameId).get();
                if (!gameDoc.exists) {
                    alert('Игра не найдена');
                    return;
                }

                document.getElementById('gameTitle').textContent = gameDoc.data().name;

                // Load scripts
                const scriptsSnapshot = await db.collection('scripts').where('gameId', '==', gameId).get();
                const scriptsContainer = document.getElementById('scriptsList');

                if (scriptsSnapshot.empty) {
                    scriptsContainer.innerHTML = '<p style="text-align: center;">Скриптов пока нет. Добавьте свой!</p>';
                } else {
                    let html = '';
                    scriptsSnapshot.forEach(doc => {
                        const script = doc.data();
                        const content = escapeHtml(script.content);
                        html += `
                            <div class="script-item">
                                <div class="script-meta">
                                    <span class="script-author">${escapeHtml(script.author || 'Аноним')}</span>
                                </div>
                                <pre class="script-code">${content}</pre>
                                <button class="btn btn-primary copy-script-btn" onclick="copyScript('${content.replace(/'/g, "\\'")}')">
                                    <i class="fas fa-copy"></i> Копировать
                                </button>
                            </div>
                        `;
                    });
                    scriptsContainer.innerHTML = html;
                }

                // Load comments
                const commentsSnapshot = await db.collection('comments').where('gameId', '==', gameId).get();
                const commentsContainer = document.getElementById('commentsList');

                if (commentsSnapshot.empty) {
                    commentsContainer.innerHTML = '<p>Комментариев нет</p>';
                } else {
                    let html = '';
                    commentsSnapshot.forEach(doc => {
                        const comment = doc.data();
                        html += `
                            <div class="comment">
                                <div class="comment-header">
                                    <span class="comment-name">${escapeHtml(comment.name || 'Аноним')}</span>
                                </div>
                                <div class="comment-text">${escapeHtml(comment.text)}</div>
                            </div>
                        `;
                    });
                    commentsContainer.innerHTML = html;
                }

                // Switch section
                document.getElementById('home-section').classList.remove('active');
                document.getElementById('game-section').classList.add('active');

            } catch (error) {
                console.error('Error:', error);
                alert('Ошибка: ' + error.message);
            }
        };

        window.showHome = () => {
            document.getElementById('home-section').classList.add('active');
            document.getElementById('game-section').classList.remove('active');
            currentGameId = null;
        };

        // Add script
        window.showAddScriptModal = () => {
            if (!currentUser) {
                alert('Нужно войти через GitHub');
                return;
            }
            document.getElementById('addScriptModal').classList.add('active');
        };

        window.closeModal = (id) => {
            document.getElementById(id).classList.remove('active');
        };

        window.addScript = async () => {
            if (!currentUser) return;

            const gameName = document.getElementById('newGameName').value.trim();
            const gameDesc = document.getElementById('newGameDesc').value.trim();
            const scriptContent = document.getElementById('newScriptContent').value.trim();

            if (!gameName || !scriptContent) {
                alert('Заполните название игры и скрипт');
                return;
            }

            if (containsForbidden(gameName) || containsForbidden(scriptContent)) {
                alert('Обнаружены запрещённые слова');
                return;
            }

            try {
                // Find or create game
                let gameId;
                const gamesSnapshot = await db.collection('games').where('name', '==', gameName).get();

                if (gamesSnapshot.empty) {
                    const newGame = await db.collection('games').add({
                        name: gameName,
                        desc: gameDesc || 'Без описания',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    gameId = newGame.id;
                } else {
                    gameId = gamesSnapshot.docs[0].id;
                }

                // Add script
                await db.collection('scripts').add({
                    gameId: gameId,
                    content: scriptContent,
                    author: currentUser.displayName || currentUser.email,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                alert('✅ Скрипт добавлен!');
                closeModal('addScriptModal');
                
                // Clear form
                document.getElementById('newGameName').value = '';
                document.getElementById('newGameDesc').value = '';
                document.getElementById('newScriptContent').value = '';

                // Reload games
                loadGames();

                // If we're on that game, show it
                if (currentGameId === gameId) {
                    showGame(gameId);
                }

            } catch (error) {
                console.error('Error:', error);
                alert('Ошибка: ' + error.message);
            }
        };

        // Add comment
        window.addComment = async () => {
            if (!currentGameId) return;

            const name = document.getElementById('commentName').value.trim() || 'Аноним';
            const text = document.getElementById('commentText').value.trim();

            if (!text) {
                alert('Введите комментарий');
                return;
            }

            if (containsForbidden(name) || containsForbidden(text)) {
                alert('Запрещённые слова');
                return;
            }

            try {
                await db.collection('comments').add({
                    gameId: currentGameId,
                    name: name,
                    text: text,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                document.getElementById('commentName').value = '';
                document.getElementById('commentText').value = '';

                // Reload comments
                const commentsSnapshot = await db.collection('comments').where('gameId', '==', currentGameId).get();
                let html = '';
                commentsSnapshot.forEach(doc => {
                    const comment = doc.data();
                    html += `
                        <div class="comment">
                            <div class="comment-header">
                                <span class="comment-name">${escapeHtml(comment.name || 'Аноним')}</span>
                            </div>
                            <div class="comment-text">${escapeHtml(comment.text)}</div>
                        </div>
                    `;
                });
                document.getElementById('commentsList').innerHTML = html;

            } catch (error) {
                console.error('Error:', error);
                alert('Ошибка: ' + error.message);
            }
        };

        window.copyScript = (text) => {
            navigator.clipboard.writeText(text).then(() => {
                alert('✅ Скопировано!');
            });
        };

        // Initialize
        loadGames();
    </script>
</body>
</html>
