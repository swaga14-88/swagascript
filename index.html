<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWAGA SCRIPT — читы для Roblox</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        :root {
            --primary: #4361ee; --primary-dark: #3a56d4; --secondary: #7209b7; --accent: #f72585;
            --dark: #1a1a2e; --darker: #0f0f1a; --light: #f8f9fa; --gray: #6c757d;
            --success: #4cc9f0; --warning: #f8961e; --danger: #e63946; --card-bg: #16213e;
            --border-radius: 12px; --shadow: 0 10px 20px rgba(0,0,0,0.2); --transition: all 0.3s ease;
        }
        body { background: linear-gradient(135deg, var(--darker), var(--dark)); color: var(--light); line-height: 1.6; min-height: 100vh; }
        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        header { background: rgba(26,26,46,0.95); backdrop-filter: blur(10px); position: fixed; top: 0; width: 100%; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .header-container { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; flex-wrap: wrap; gap: 15px; }
        .logo { display: flex; align-items: center; gap: 12px; font-size: 1.8rem; font-weight: 700; color: white; text-decoration: none; cursor: pointer; }
        .logo i { color: var(--accent); }
        .logo span { background: linear-gradient(90deg, var(--accent), var(--success)); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .tg-link { display: flex; align-items: center; gap: 8px; background: #0088cc; padding: 10px 20px; border-radius: var(--border-radius); color: white; text-decoration: none; font-weight: 600; transition: var(--transition); }
        .tg-link:hover { background: #0077b5; transform: translateY(-2px); box-shadow: var(--shadow); }
        .user-area { display: flex; align-items: center; gap: 15px; }
        .btn { padding: 12px 28px; border-radius: var(--border-radius); font-weight: 600; cursor: pointer; transition: var(--transition); border: none; font-size: 1rem; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
        .btn-outline { background: transparent; color: var(--light); border: 2px solid rgba(255,255,255,0.2); }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
        .btn-success { background: var(--success); color: var(--dark); }
        .btn-success:hover { background: #3ab8d9; transform: translateY(-3px); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: #c82333; transform: translateY(-3px); }
        .btn-sm { padding: 8px 16px; font-size: 0.9rem; }
        .section { padding: 120px 0 60px; min-height: 100vh; display: none; }
        .section.active { display: block; }
        .section-title { text-align: center; margin-bottom: 40px; font-size: 2.5rem; }
        .section-title span { color: var(--accent); position: relative; }
        .search-box { max-width: 600px; margin: 0 auto 40px; display: flex; gap: 10px; }
        .search-box input { flex: 1; padding: 18px 25px; border-radius: 50px; border: 2px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; font-size: 1.1rem; transition: var(--transition); }
        .search-box input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(67,97,238,0.2); }
        .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .game-card { background: var(--card-bg); border-radius: var(--border-radius); padding: 25px; border: 1px solid rgba(255,255,255,0.05); transition: var(--transition); cursor: pointer; text-align: center; }
        .game-card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: var(--shadow); }
        .game-card i { font-size: 3rem; color: var(--success); margin-bottom: 15px; }
        .game-card h3 { font-size: 1.4rem; margin-bottom: 10px; }
        .game-card p { color: rgba(255,255,255,0.7); font-size: 0.95rem; }
        .back-btn { margin-bottom: 30px; }
        .scripts-container { display: flex; flex-direction: column; gap: 20px; margin: 30px 0; }
        .script-item { background: var(--card-bg); border-radius: var(--border-radius); padding: 20px; border: 1px solid rgba(255,255,255,0.05); position: relative; }
        .script-meta { display: flex; justify-content: space-between; margin-bottom: 10px; color: var(--gray); font-size: 0.9rem; flex-wrap: wrap; }
        .script-author { color: var(--success); font-weight: 600; }
        .script-date { color: var(--gray); }
        .script-code { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; overflow-x: auto; color: #0f0; font-family: 'Courier New', monospace; margin-bottom: 15px; white-space: pre-wrap; word-wrap: break-word; }
        .script-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .copy-script-btn { flex: 2; }
        .report-btn { flex: 1; }
        .comments { margin: 30px 0; }
        .comment { background: rgba(255,255,255,0.05); border-radius: var(--border-radius); padding: 20px; margin-bottom: 15px; border-left: 3px solid var(--accent); position: relative; }
        .comment-header { display: flex; justify-content: space-between; margin-bottom: 10px; color: var(--gray); font-size: 0.9rem; flex-wrap: wrap; }
        .comment-name { font-weight: 600; color: var(--success); }
        .comment-actions { margin-top: 10px; display: flex; justify-content: flex-end; }
        .add-comment { background: var(--card-bg); border-radius: var(--border-radius); padding: 30px; border: 1px solid rgba(255,255,255,0.05); }
        .add-comment input, .add-comment textarea { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: var(--border-radius); border: 2px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: white; font-size: 1rem; transition: var(--transition); }
        .add-comment textarea { min-height: 100px; resize: vertical; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: var(--dark); width: 90%; max-width: 500px; border-radius: var(--border-radius); padding: 40px; position: relative; border: 1px solid rgba(255,255,255,0.05); }
        .close-modal { position: absolute; top: 20px; right: 20px; background: none; border: none; color: var(--light); font-size: 1.5rem; cursor: pointer; }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 10px; color: var(--light); font-weight: 500; }
        .form-group input, .form-group textarea { width: 100%; padding: 15px; border-radius: var(--border-radius); border: 2px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: white; font-size: 1rem; }
        footer { background: rgba(0,0,0,0.3); padding: 30px 0; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); color: rgba(255,255,255,0.5); }
        @media (max-width: 768px) {
            .header-container { flex-direction: column; align-items: stretch; }
            .user-area { justify-content: center; }
            .section-title { font-size: 2rem; }
            .search-box { flex-direction: column; }
        }
    </style>
</head>
<body>
    <header>
        <div class="container header-container">
            <div class="logo" onclick="showHome()">
                <i class="fas fa-robot"></i>
                <span>SWAGA SCRIPT</span>
            </div>
            <div class="user-area">
                <a href="https://t.me/swagascript" target="_blank" class="tg-link">
                    <i class="fab fa-telegram"></i> @swagascript
                </a>
                <div id="authSection">
                    <button class="btn btn-primary" onclick="loginWithGitHub()" id="loginBtn">
                        <i class="fab fa-github"></i> Войти через GitHub
                    </button>
                    <div id="userInfo" style="display: none; align-items: center; gap: 10px;">
                        <span><i class="fab fa-github"></i> <span id="githubUsername"></span></span>
                        <button class="btn btn-outline btn-sm" onclick="logout()">Выйти</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Главная страница -->
    <section id="home-section" class="section active">
        <div class="container">
            <h1 class="section-title">Выбери <span>игру</span></h1>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="🔍 Поиск игры..." oninput="filterGames()">
                <button class="btn btn-success" onclick="showAddScriptModalFromHome()" id="addScriptGlobalBtn">
                    <i class="fas fa-plus"></i> Добавить скрипт
                </button>
            </div>
            <div id="games-list" class="games-grid"></div>
        </div>
    </section>

    <!-- Детальная страница игры -->
    <section id="game-section" class="section">
        <div class="container">
            <button class="btn btn-outline back-btn" onclick="showHome()">
                <i class="fas fa-arrow-left"></i> Назад к играм
            </button>
            <h2 id="game-title" class="section-title" style="margin-bottom: 20px;"></h2>
            
            <div class="add-script-btn">
                <button class="btn btn-success" onclick="showAddScriptModalForCurrentGame()">
                    <i class="fas fa-plus"></i> Предложить свой скрипт
                </button>
            </div>

            <div id="scripts-list" class="scripts-container"></div>

            <h3 style="margin: 40px 0 20px;">Комментарии</h3>
            <div id="comments-list" class="comments"></div>

            <div class="add-comment">
                <input type="text" id="comment-name" placeholder="Ваше имя (или оставьте пустым для Анонима)">
                <textarea id="comment-text" placeholder="Напишите комментарий..."></textarea>
                <button class="btn btn-success" onclick="addComment()">
                    <i class="fas fa-paper-plane"></i> Отправить
                </button>
            </div>
        </div>
    </section>

    <!-- Модальное окно добавления скрипта -->
    <div class="modal" id="addScriptModal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal('addScriptModal')">&times;</button>
            <h2>Добавить скрипт</h2>
            <div class="form-group">
                <label for="scriptGameName">Название игры</label>
                <input type="text" id="scriptGameName" placeholder="Введите название игры" autocomplete="off">
            </div>
            <div class="form-group">
                <label for="gameDesc">Описание игры (если игра новая)</label>
                <textarea id="gameDesc" placeholder="Краткое описание..."></textarea>
            </div>
            <div class="form-group">
                <label for="scriptContent">Скрипт (Lua)</label>
                <textarea id="scriptContent" placeholder="loadstring(...)"></textarea>
            </div>
            <button class="btn btn-success" style="width: 100%;" onclick="addUserScript()">
                <i class="fas fa-upload"></i> Опубликовать
            </button>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>© 2025 SWAGA SCRIPT — читы для Roblox. Не для детей до 12 лет.</p>
        </div>
    </footer>

    <script>
        // 🔥 КОНФИГ FIREBASE - ВАШ ПРОЕКТ swaga-script 🔥
        const firebaseConfig = {
            apiKey: "AIzaSyBJn3GAs1mikK9eO87BevUEvZ7rqXG_uZ4",
            authDomain: "swaga-script.firebaseapp.com",
            projectId: "swaga-script",
            storageBucket: "swaga-script.firebasestorage.app",
            messagingSenderId: "368222431535",
            appId: "1:368222431535:web:759fb5182eb07fe25c19da",
            measurementId: "G-554WDP13J2"
        };

        // Инициализация Firebase
        firebase.initializeApp(firebaseConfig);
        const analytics = firebase.analytics();
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Провайдер GitHub
        const githubProvider = new firebase.auth.GithubAuthProvider();
        githubProvider.addScope('read:user');

        // Глобальные переменные
        let currentUser = null;
        let currentGameId = null;

        // Список запрещённых слов
        const forbiddenWords = [
            'реклама', 'пиар', 'подпишись', 'промо', 'сука', 'бля', 'хуй', 'пизда', 'гандон',
            'cock', 'fuck', 'shit', 'bitch', 'asshole', 'spam', 'advertisement', 'buy', 'cheap'
        ];

        function containsForbidden(text) {
            const lower = text.toLowerCase();
            return forbiddenWords.some(word => lower.includes(word));
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Авторизация
        window.loginWithGitHub = function() {
            auth.signInWithPopup(githubProvider)
                .then(result => {
                    currentUser = result.user;
                    updateAuthUI();
                })
                .catch(error => {
                    console.error(error);
                    alert('Ошибка входа: ' + error.message);
                });
        };

        window.logout = function() {
            auth.signOut().then(() => {
                currentUser = null;
                updateAuthUI();
            });
        };

        function updateAuthUI() {
            const loginBtn = document.getElementById('loginBtn');
            const userInfo = document.getElementById('userInfo');
            const usernameSpan = document.getElementById('githubUsername');
            if (currentUser) {
                loginBtn.style.display = 'none';
                userInfo.style.display = 'flex';
                usernameSpan.textContent = currentUser.displayName || currentUser.email || currentUser.uid;
            } else {
                loginBtn.style.display = 'inline-flex';
                userInfo.style.display = 'none';
            }
        }

        auth.onAuthStateChanged(user => {
            currentUser = user;
            updateAuthUI();
        });

        // Загрузка игр из Firestore
        async function loadGames() {
            const snapshot = await db.collection('games').orderBy('name').get();
            return snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        }

        async function renderGames() {
            const games = await loadGames();
            const container = document.getElementById('games-list');
            container.innerHTML = '';
            games.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.onclick = () => showGame(game.id);
                card.innerHTML = `
                    <i class="fas fa-gamepad"></i>
                    <h3>${escapeHtml(game.name)}</h3>
                    <p>${escapeHtml(game.desc || '')}</p>
                `;
                container.appendChild(card);
            });
        }

        window.filterGames = async function() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const games = await loadGames();
            const filtered = games.filter(g => g.name.toLowerCase().includes(query));
            const container = document.getElementById('games-list');
            container.innerHTML = '';
            filtered.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.onclick = () => showGame(game.id);
                card.innerHTML = `
                    <i class="fas fa-gamepad"></i>
                    <h3>${escapeHtml(game.name)}</h3>
                    <p>${escapeHtml(game.desc || '')}</p>
                `;
                container.appendChild(card);
            });
        };

        window.showHome = function() {
            document.getElementById('home-section').classList.add('active');
            document.getElementById('game-section').classList.remove('active');
            currentGameId = null;
            renderGames();
        };

        async function showGame(gameId) {
            currentGameId = gameId;
            const gameDoc = await db.collection('games').doc(gameId).get();
            const game = gameDoc.data();
            document.getElementById('game-title').innerText = game.name;

            const scriptsSnapshot = await db.collection('scripts').where('gameId', '==', gameId).orderBy('createdAt', 'desc').get();
            const scripts = scriptsSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderScripts(scripts);

            const commentsSnapshot = await db.collection('comments').where('gameId', '==', gameId).orderBy('createdAt', 'desc').get();
            const comments = commentsSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderComments(comments);

            document.getElementById('home-section').classList.remove('active');
            document.getElementById('game-section').classList.add('active');
        }

        function renderScripts(scripts) {
            const container = document.getElementById('scripts-list');
            if (!scripts.length) {
                container.innerHTML = '<p style="text-align: center; color: var(--gray);">Скриптов пока нет. Добавьте свой!</p>';
                return;
            }
            container.innerHTML = scripts.map(script => `
                <div class="script-item" data-id="${script.id}">
                    <div class="script-meta">
                        <span class="script-author"><i class="fas fa-user"></i> ${escapeHtml(script.author || 'Аноним')}</span>
                        <span class="script-date">${new Date(script.createdAt?.toDate()).toLocaleString()}</span>
                    </div>
                    <pre class="script-code">${escapeHtml(script.content)}</pre>
                    <div class="script-actions">
                        <button class="btn btn-primary copy-script-btn" onclick="copyScript('${escapeHtml(script.content)}')">
                            <i class="fas fa-copy"></i> Копировать
                        </button>
                        <button class="btn btn-danger report-btn" onclick="reportScript('${script.id}')">
                            <i class="fas fa-flag"></i> Пожаловаться
                        </button>
                    </div>
                </div>
            `).join('');
        }

        window.copyScript = function(scriptText) {
            navigator.clipboard.writeText(scriptText).then(() => {
                alert('✅ Скрипт скопирован!');
            }).catch(() => {
                alert('❌ Не удалось скопировать, выделите текст вручную.');
            });
        };

        window.reportScript = async function(scriptId) {
            if (!currentUser) {
                alert('Чтобы пожаловаться, войдите через GitHub.');
                return;
            }
            try {
                await db.collection('reports').add({
                    type: 'script',
                    targetId: scriptId,
                    userId: currentUser.uid,
                    userName: currentUser.displayName || currentUser.email,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert('✅ Жалоба отправлена администрации.');
            } catch (e) {
                alert('Ошибка при отправке жалобы.');
            }
        };

        window.reportComment = async function(commentId) {
            if (!currentUser) {
                alert('Чтобы пожаловаться, войдите через GitHub.');
                return;
            }
            try {
                await db.collection('reports').add({
                    type: 'comment',
                    targetId: commentId,
                    userId: currentUser.uid,
                    userName: currentUser.displayName || currentUser.email,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert('✅ Жалоба отправлена администрации.');
            } catch (e) {
                alert('Ошибка при отправке жалобы.');
            }
        };

        window.showAddScriptModalFromHome = function() {
            if (!currentUser) {
                alert('Для добавления скрипта необходимо войти через GitHub.');
                return;
            }
            document.getElementById('scriptGameName').value = '';
            document.getElementById('gameDesc').value = '';
            document.getElementById('scriptContent').value = '';
            document.getElementById('addScriptModal').classList.add('active');
        };

        window.showAddScriptModalForCurrentGame = function() {
            if (!currentUser) {
                alert('Для добавления скрипта необходимо войти через GitHub.');
                return;
            }
            if (currentGameId) {
                db.collection('games').doc(currentGameId).get().then(doc => {
                    document.getElementById('scriptGameName').value = doc.data().name;
                });
            } else {
                document.getElementById('scriptGameName').value = '';
            }
            document.getElementById('gameDesc').value = '';
            document.getElementById('scriptContent').value = '';
            document.getElementById('addScriptModal').classList.add('active');
        };

        window.closeModal = function(modalId) {
            document.getElementById(modalId).classList.remove('active');
        };

        window.addUserScript = async function() {
            if (!currentUser) return;

            const gameName = document.getElementById('scriptGameName').value.trim();
            const gameDesc = document.getElementById('gameDesc').value.trim();
            const scriptContent = document.getElementById('scriptContent').value.trim();

            if (!gameName || !scriptContent) {
                alert('Заполните название игры и текст скрипта.');
                return;
            }

            if (containsForbidden(gameName) || containsForbidden(gameDesc) || containsForbidden(scriptContent)) {
                alert('Обнаружены запрещённые слова (мат, реклама и т.п.). Публикация невозможна.');
                return;
            }

            try {
                const gamesRef = db.collection('games');
                const snapshot = await gamesRef.where('name', '==', gameName).get();
                let gameId;
                if (snapshot.empty) {
                    const newGame = await gamesRef.add({
                        name: gameName,
                        desc: gameDesc || 'Описание отсутствует',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    gameId = newGame.id;
                } else {
                    gameId = snapshot.docs[0].id;
                }

                await db.collection('scripts').add({
                    gameId: gameId,
                    content: scriptContent,
                    author: currentUser.displayName || currentUser.email,
                    authorUid: currentUser.uid,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                alert('✅ Скрипт успешно добавлен!');
                closeModal('addScriptModal');

                if (currentGameId === gameId) {
                    showGame(gameId);
                } else {
                    showHome();
                }
            } catch (e) {
                console.error(e);
                alert('Ошибка при сохранении. Попробуйте ещё раз.');
            }
        };

        function renderComments(comments) {
            const container = document.getElementById('comments-list');
            if (!comments.length) {
                container.innerHTML = '<p style="text-align: center; color: var(--gray);">Пока нет комментариев. Будьте первым!</p>';
                return;
            }
            container.innerHTML = comments.map(c => `
                <div class="comment" data-id="${c.id}">
                    <div class="comment-header">
                        <span class="comment-name">${escapeHtml(c.name || 'Аноним')}</span>
                        <span>${new Date(c.createdAt?.toDate()).toLocaleString()}</span>
                    </div>
                    <div class="comment-text">${escapeHtml(c.text)}</div>
                    <div class="comment-actions">
                        <button class="btn btn-danger btn-sm" onclick="reportComment('${c.id}')">
                            <i class="fas fa-flag"></i> Пожаловаться
                        </button>
                    </div>
                </div>
            `).join('');
        }

        window.addComment = async function() {
            if (!currentGameId) return;
            const name = document.getElementById('comment-name').value.trim() || 'Аноним';
            const text = document.getElementById('comment-text').value.trim();
            if (!text) {
                alert('Введите комментарий');
                return;
            }

            if (containsForbidden(name) || containsForbidden(text)) {
                alert('Обнаружены запрещённые слова. Комментарий не будет опубликован.');
                return;
            }

            try {
                await db.collection('comments').add({
                    gameId: currentGameId,
                    name: name,
                    text: text,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                document.getElementById('comment-name').value = '';
                document.getElementById('comment-text').value = '';
                const commentsSnapshot = await db.collection('comments').where('gameId', '==', currentGameId).orderBy('createdAt', 'desc').get();
                const comments = commentsSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderComments(comments);
            } catch (e) {
                alert('Ошибка при отправке комментария.');
            }
        };

        // Инициализация
        (async function init() {
            await renderGames();
        })();
    </script>
</body>
</html>
